name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  APP_ENV: prod
  APP_SECRET: github-pages-static-build

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Build market snapshot
        run: php bin/console app:warm-prime-set-cache --env=prod --no-debug

      - name: Export static site
        run: php bin/console app:export-static-site --env=prod --no-debug --output-dir=dist --asset-base=./

      - name: Copy static assets
        run: |
          cp -R public/favicon.svg public/scripts public/styles public/vendor dist/
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
